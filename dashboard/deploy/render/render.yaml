# Render-Blueprint — Issue #217 (Cloud-Slice 3: Backend + Jobs → Render).
# ---------------------------------------------------------------------------
# Ein Web-Service (server.js). KEIN Render-Cron/Worker (Gratis-Stufe): die
# Nachtjobs werden über geschützte Trigger-Endpunkte /internal/jobs/<key> von
# Supabase pg_cron angestoßen (deploy/render/pgcron-setup.sql). Auf einer
# bezahlten Stufe käme zusätzlich ein `worker`-Background-Worker (command:
# node worker.js) — der Code dafür existiert unverändert (Variante B).
#
# Secrets NICHT hier (kein .env, flüchtiges FS): im Render-Dashboard als
# Environment-Variablen pflegen (sync:false unten ⇒ Render fragt sie beim
# ersten Deploy ab und speichert sie verschlüsselt). Referenz: .env.example +
# docs/cloud-migration/slice-0-secrets-inventory.md.

services:
  - type: web
    name: faltrix-dashboard
    runtime: docker
    dockerfilePath: ./dashboard/Dockerfile
    dockerContext: ./dashboard
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: TZ
        value: Europe/Berlin
      - key: NODE_ENV
        value: production
      # ── Auth-Naht (#215): JWT-Pfad in der Cloud ──
      - key: DASHBOARD_AUTH_MODE
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # ── DB (Supabase, #214) ──
      - key: DASHBOARD_V2_PG_URL          # Infra (Session-Pooler 5432, service_role-äquiv.)
        sync: false
      - key: DASHBOARD_V2_APP_PG_URL      # App (Transaction-Pooler 6543, automatenlager_app, RLS)
        sync: false
      # ── Cron-Quelle-Schutz (#217): geschützte Trigger-Endpunkte ──
      - key: WORKER_TRIGGER_SECRET
        generateValue: true               # Render erzeugt ein starkes Secret; dasselbe in pgcron-setup.sql eintragen
      # ── Error-Tracking (#217) ──
      - key: SENTRY_DSN
        sync: false
      # ── Externe Dienste (Secrets — Werte im Dashboard) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ALERT_EMAIL_DEFAULT
        sync: false
      - key: NAYAX_API_TOKEN
        sync: false
      - key: NAYAX_BASE_URL
        sync: false
      - key: NAYAX_MACHINE_ID
        sync: false
      - key: NAYAX_TENANT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      # ── Allowlisten (Identität kommt aus dem JWT, Mapping über tenant_users) ──
      - key: DASHBOARD_ADMIN_LOGIN
        sync: false
      - key: DASHBOARD_PARTNER_LOGIN
        sync: false
      # ── Off-Site-Backup (#216): auf Render nur sinnvoll mit persistentem Ziel ──
      # SUPABASE_BACKUP_DIR/_PG_BIN bewusst NICHT gesetzt ⇒ Backup-Job skippt auf
      # Render (flüchtiges FS). Das Backup läuft weiter auf dem Mini, bis ein
      # Objektspeicher-Ziel angebunden ist (Folgearbeit, #216-Erweiterung).
